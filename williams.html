<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#03111f"><title>Williams Pool Data</title><style>html,body{margin:0;width:100%;height:100%;background:#03111f;overflow:hidden}iframe{border:0;width:100%;height:100%;display:block}</style></head><body><iframe id="poolApp" src="app.html" title="Williams Pool Data"></iframe><script>
const f=document.getElementById('poolApp');
f.addEventListener('load',async()=>{const d=f.contentDocument;if(!d)return;d.title='Williams Pool Data';
const rename=()=>{const w=d.createTreeWalker(d.body,NodeFilter.SHOW_TEXT),a=[];while(w.nextNode())a.push(w.currentNode);a.forEach(n=>n.nodeValue=n.nodeValue.replace(/ROB'S POOL/g,'WILLIAMS POOL DATA').replace(/Rob's Pool/g,'Williams Pool Data').replace(/Pool Command Center/g,'Williams Pool Data'))};rename();
const s=d.createElement('style');s.textContent=`.williams-hero{position:relative;min-height:270px;border-radius:22px;overflow:hidden;border:1px solid var(--line,#1b4663);margin:0 0 18px;background:linear-gradient(90deg,rgba(2,13,24,.9),rgba(2,13,24,.35)),linear-gradient(135deg,#0b3a5c,#03111f);background-position:center;background-size:cover;box-shadow:0 18px 50px #0006;display:flex;align-items:flex-end}.williams-hero .inner{padding:26px;max-width:760px}.williams-hero .eyebrow{font-size:11px;letter-spacing:2px;font-weight:800;color:#31d9ff;text-transform:uppercase}.williams-hero h1{margin:7px 0 8px;font-size:clamp(28px,5vw,52px);line-height:1.02;color:#fff}.williams-hero p{margin:0;color:#d8e8f2;font-size:14px}.weather-card{position:absolute;right:18px;top:18px;width:min(290px,calc(100% - 36px));padding:14px 16px;border-radius:16px;background:#03111fd9;backdrop-filter:blur(12px);border:1px solid #31d9ff33;color:#fff}.weather-card small{display:block;color:#89a7ba;font-weight:700}.weather-main{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-top:6px}.weather-temp{font-size:34px;font-weight:800}.weather-details{font-size:12px;color:#d8e8f2;text-align:right}@media(max-width:700px){.williams-hero{min-height:360px}.weather-card{left:14px;right:14px;top:14px;width:auto}.williams-hero .inner{padding:170px 18px 20px}}`;d.head.appendChild(s);
const dash=d.getElementById('dashboard')||d.querySelector('main');if(dash&&!d.getElementById('williamsHero')){const h=d.createElement('div');h.id='williamsHero';h.className='williams-hero';h.innerHTML='<div class="weather-card" id="williamsWeather"><small>LIVE WEATHER · 37922</small><div class="weather-main"><div class="weather-temp">--°</div><div class="weather-details">Loading Knoxville weather…</div></div></div><div class="inner"><div class="eyebrow">Williams Pool Data</div><h1>Williams Pool Data</h1><p>Live chemistry, maintenance, photos, and weather in one place.</p></div>';dash.prepend(h)}
const setPhoto=()=>{const hero=d.getElementById('williamsHero');if(!hero)return;const imgs=[...d.querySelectorAll('#dashPhotos img,#allPhotos img,.photo img')];const img=imgs.find(x=>x.src&&x.naturalWidth>100);if(img)hero.style.backgroundImage=`linear-gradient(90deg,rgba(2,13,24,.9),rgba(2,13,24,.35)),url("${img.src}")`};setTimeout(setPhoto,1000);setTimeout(setPhoto,3000);new MutationObserver(setPhoto).observe(d.body,{childList:true,subtree:true});
try{const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.86&longitude=-84.08&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York'),j=await r.json(),c=j.current||{},l={0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Cloudy',45:'Fog',48:'Fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Rain showers',82:'Heavy showers',95:'Thunderstorms',96:'Thunderstorms',99:'Thunderstorms'},b=d.getElementById('williamsWeather');if(b){b.querySelector('.weather-temp').textContent=Math.round(c.temperature_2m)+'°';b.querySelector('.weather-details').innerHTML=`${l[c.weather_code]||'Current conditions'}<br>Feels ${Math.round(c.apparent_temperature)}° · Humidity ${c.relative_humidity_2m}%<br>Wind ${Math.round(c.wind_speed_10m)} mph`}}catch(e){const b=d.getElementById('williamsWeather');if(b)b.querySelector('.weather-details').textContent='Weather temporarily unavailable'}});
</script></body></html>
